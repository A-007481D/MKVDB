syntax = "proto3";

package raft;

service RaftService {
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
}

message LogId {
  uint64 term = 1;
  uint64 node_id = 2;
  uint64 index = 3;
}

message Vote {
  uint64 term = 1;
  uint64 node_id = 2;
  bool committed = 3;
}

enum EntryType {
  NORMAL = 0;
  BLANK = 1;
  MEMBERSHIP = 2;
}

message LogEntry {
  LogId log_id = 1;
  bytes data = 2;
  EntryType entry_type = 3;
}

message AppendEntriesRequest {
  Vote vote = 1;
  LogId prev_log_id = 2;
  repeated LogEntry entries = 3;
  LogId leader_commit = 4;
}

message AppendEntriesResponse {
  Vote vote = 1;
  bool success = 2;
  LogId conflict_log_id = 3;
}

message RequestVoteRequest {
  Vote vote = 1;
  LogId last_log_id = 2;
}

message RequestVoteResponse {
  Vote vote = 1;
  bool vote_granted = 2;
}

message InstallSnapshotRequest {
  Vote vote = 1;
  LogId last_log_id = 2;
  bytes data = 3;
  uint64 offset = 4;
  bool done = 5;
}

message InstallSnapshotResponse {
  Vote vote = 1;
}
